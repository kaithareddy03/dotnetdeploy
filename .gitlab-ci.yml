stages:
  - build
  - package

build_job:
  stage: build
  tags:
    - linux
  script:
    - set -xe
    - echo "START BUILD"

    - echo "Current directory"
    - pwd
    - ls -la

    - echo "Restore"
    - dotnet restore RSign.SendAPI.sln

    - echo "Build"
    - dotnet build RSign.SendAPI.sln --configuration Release

package_job:
  stage: package
  tags:
    - linux
  script:
    - set -xe
    - echo "Publishing"

    - dotnet publish RSign.SendAPI/RSign.SendAPI.csproj -c Release -o publish

    - ls -la publish
  artifacts:
    paths:
      - publish