stages:
  - build
  - quality
  - security
  - package
  - deploy

variables:
  PROJECT_PATH: "RSign.SendAPI/RSign.SendAPI.csproj"

# ---------------- BUILD ----------------
build_job:
  stage: build
  tags:
    - linux
  script:
    - set -xe
    - echo "START BUILD"

    - pwd
    - ls -la

    - echo "Restore"
    - dotnet restore RSign.SendAPI/RSign.SendAPI.sln

    - echo "Build"
    - dotnet build RSign.SendAPI/RSign.SendAPI.sln --configuration Release

# ---------------- SONARQUBE ----------------
sonarqube_scan:
  stage: quality
  tags:
    - linux
  script:
    - set -xe
    - echo "SONAR SCAN"

    - dotnet tool install --global dotnet-sonarscanner || true
    - export PATH="$PATH:$HOME/.dotnet/tools"

    - dotnet sonarscanner begin \
        /k:"rsign-api" \
        /d:sonar.host.url="http://rsignapp34.use.rpost.net:9047" \
        /d:sonar.login="$SONAR_TOKEN"

    - dotnet build RSign.SendAPI/RSign.SendAPI.sln

    - dotnet sonarscanner end \
        /d:sonar.login="$SONAR_TOKEN"

# ---------------- OWASP ----------------
owasp_scan:
  stage: security
  tags:
    - linux
  script:
    - set -xe
    - echo "OWASP SCAN"

    - dotnet tool install --global dotnet-outdated-tool || true
    - export PATH="$PATH:$HOME/.dotnet/tools"

    - dotnet outdated --severity Critical || true

# ---------------- PACKAGE ----------------
package_job:
  stage: package
  tags:
    - linux
  script:
    - set -xe
    - echo "Publishing"

    - dotnet publish RSign.SendAPI/RSign.SendAPI.csproj -c Release -o publish

    - ls -la publish
  artifacts:
    paths:
      - publish

# ---------------- DEPLOY ----------------
deploy_job:
  stage: deploy
  tags:
    - windows
  dependencies:
    - package_job
  script:
    - powershell -Command "
        $ErrorActionPreference = 'Stop'

        $source = '$env:CI_PROJECT_DIR\publish'
        $dest   = 'D:\RSignSendAPI'
        $backup = 'D:\backup\RSignSendAPI'

        $timestamp = Get-Date -Format 'yyyyMMdd_HHmmss'
        $backupPath = \"$backup`_$timestamp\"

        Write-Output 'Taking backup...'
        Copy-Item $dest $backupPath -Recurse -Force

        Write-Output 'Deploying files...'
        Copy-Item \"$source\*\" -Destination $dest -Recurse -Force

        Write-Output 'Deployment completed successfully'
      "