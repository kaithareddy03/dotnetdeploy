stages:
  - build
  - security
  - deploy

# ---------------- BUILD (LINUX) ----------------
build_job:
  stage: build
  tags:
    - linux
  script:
    - echo "Cloning repository..."
    - git clone https://github.com/kaithareddy03/dotnetdeploy.git repo
    - cd repo

    - echo "Installing SonarScanner..."
    - dotnet tool install --global dotnet-sonarscanner
    - export PATH="$PATH:$HOME/.dotnet/tools"

    - echo "Starting SonarQube analysis..."
    - dotnet sonarscanner begin \
        /k:"rsign-api" \
        /d:sonar.host.url="http://rsignapp34.use.rpost.net:9047" \
        /d:sonar.login="$SONAR_TOKEN"

    - echo "Building project..."
    - dotnet restore
    - dotnet build --configuration Release
    - dotnet publish -c Release -o publish

    - echo "Ending SonarQube analysis..."
    - dotnet sonarscanner end \
        /d:sonar.login="$SONAR_TOKEN"

  artifacts:
    paths:
      - repo/publish

# ---------------- SECURITY (LINUX) ----------------
security_scan:
  stage: security
  tags:
    - linux
  script:
    - cd repo

    - echo "Installing vulnerability scanner..."
    - dotnet tool install --global dotnet-outdated-tool || true
    - export PATH="$PATH:$HOME/.dotnet/tools"

    - echo "Running vulnerability scan..."
    - dotnet outdated --severity Critical

    - |
      if [ $? -ne 0 ]; then
        echo "❌ Critical vulnerabilities found!"
        exit 1
      else
        echo "✅ No critical vulnerabilities"
      fi

# ---------------- DEPLOY (WINDOWS) ----------------
deploy_job:
  stage: deploy
  tags:
    - windows
  dependencies:
    - build_job
  script:
    - powershell -Command "
        $ErrorActionPreference = 'Stop'

        $artifactPath = '$env:CI_PROJECT_DIR\repo\publish'
        $deployPath   = 'D:\RSignSendAPI'
        $backupRoot   = 'D:\backup'

        $timestamp = Get-Date -Format 'yyyyMMdd_HHmmss'
        $backupPath = \"$backupRoot\RSignAPI_$timestamp\"

        Write-Output 'Taking backup...'
        Copy-Item $deployPath $backupPath -Recurse -Force

        Write-Output 'Deploying new build...'
        Copy-Item \"$artifactPath\*\" -Destination $deployPath -Recurse -Force

    

        Write-Output 'Deployment completed successfully!'
      "

