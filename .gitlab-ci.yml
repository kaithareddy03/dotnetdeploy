stages:
  - build

build_job:
  stage: build
  tags:
    - linux
  script:
    - set -x
    - echo "START BUILD"

    - cd /var/www/dotnetdeploy

    - echo "Updating latest code..."
    - git reset --hard
    - git clean -fd
    - git pull origin main

    - echo "Building project..."
    - dotnet restore RSign.SendAPI.csproj
    - dotnet build RSign.SendAPI.csproj --configuration Release

    - echo "Publishing..."
    - dotnet publish RSign.SendAPI.csproj -c Release -o publish
