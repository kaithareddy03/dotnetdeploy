build_job:
  stage: build
  tags:
    - linux
  script:
    - set -x
    - echo "Using existing repo..."
    - cd /var/www/dotnetdeploy

    - echo "Updating latest code..."
    - git reset --hard
    - git clean -fd
    - git pull origin main

    - echo "Installing SonarScanner..."
    - dotnet tool install --global dotnet-sonarscanner || true
    - export PATH="$PATH:$HOME/.dotnet/tools"

    - echo "Starting SonarQube..."
    - dotnet sonarscanner begin /k:"rsign-api" /d:sonar.host.url="http://rsignapp34.use.rpost.net:9047" /d:sonar.login="$SONAR_TOKEN" /d:sonar.qualitygate.wait=true

    - echo "Building..."
    - dotnet restore RSign.SendAPI.sln
    - dotnet build RSign.SendAPI.sln --configuration Release

    - echo "Publishing..."
    - dotnet publish RSign.SendAPI.sln -c Release -o publish

    - dotnet sonarscanner end /d:sonar.login="$SONAR_TOKEN"
