stages:
  - build
  - quality
  - security
  - package
  - deploy

variables:
  PROJECT_SOLUTION: "RSign.SendAPI/RSign.SendAPI.sln"
  PROJECT_CSPROJ: "RSign.SendAPI/RSign.SendAPI.csproj"

# ---------------- BUILD ----------------
build_job:
  stage: build
  tags:
    - linux
  script:
    - set -xe
    - echo "===== BUILD START ====="

    - pwd
    - ls -la

    - echo "Restore"
    - dotnet restore $PROJECT_SOLUTION

    - echo "Build"
    - dotnet build $PROJECT_SOLUTION --configuration Release

# ---------------- SONARQUBE ----------------
sonarqube_scan:
  stage: quality
  tags:
    - linux
  script:
  - set -xe
  - echo "===== SONARQUBE SCAN ====="

  - dotnet tool install --global dotnet-sonarscanner || true
  - export PATH="$PATH:$HOME/.dotnet/tools"

  - dotnet sonarscanner begin /k:"rsign-api" /d:sonar.host.url="http://rsignapp34.use.rpost.net:9047" /d:sonar.login="$SONAR_TOKEN"

  - dotnet build RSign.SendAPI/RSign.SendAPI.sln -c Release

  - dotnet sonarscanner end /d:sonar.login="$SONAR_TOKEN"
# ---------------- OWASP ----------------
owasp_scan:
  stage: security
  tags:
    - linux
  script:
    - set -xe
    - echo "===== OWASP SCAN ====="

    - dotnet tool install --global dotnet-outdated-tool || true
    - export PATH="$PATH:$HOME/.dotnet/tools"

    - dotnet outdated --severity Critical || true

# ---------------- PACKAGE ----------------
package_job:
  stage: package
  tags:
    - linux
  script:
    - set -xe
    - echo "===== PACKAGE ====="

    - dotnet publish $PROJECT_CSPROJ -c Release -o publish

    - ls -la publish
  artifacts:
    paths:
      - publish

# ---------------- DEPLOY ----------------
deploy_job:
  stage: deploy
  tags:
    - windows
  dependencies:
    - package_job
  variables:
    GIT_STRATEGY: none
  script:
    - |
      $ErrorActionPreference = 'Stop'

      $source = "$env:CI_PROJECT_DIR\publish"
      $dest   = 'D:\RSignSendAPI'
      $backup = 'D:\backup\RSignSendAPI'

      $timestamp = Get-Date -Format 'yyyyMMdd_HHmmss'
      $backupPath = "$backup`_$timestamp"

      Write-Output "Taking backup..."
      if (Test-Path $dest) {
          Copy-Item $dest $backupPath -Recurse -Force
      }

      Write-Output "Deploying files..."
      Copy-Item "$source\*" -Destination $dest -Recurse -Force

      Write-Output "Deployment completed successfully"