stages:
  - build
  - security
  - deploy

variables:
  GIT_STRATEGY: none

# ---------------- BUILD + SONAR ----------------
build_job:
  stage: build
  tags:
    - windows
  script:
    - powershell |
        $ErrorActionPreference = "Stop"

        $projectPath = "D:\dotnetdeploy"
        cd $projectPath

        Write-Output "Starting SonarQube analysis..."

        dotnet sonarscanner begin `
          /k:"rsign-api" `
          /d:sonar.host.url="http://rsignapp34.use.rpost.net:9047" `
          /d:sonar.login="$env:SONAR_TOKEN"

        dotnet restore
        dotnet build --configuration Release
        dotnet publish -c Release -o publish

        dotnet sonarscanner end `
          /d:sonar.login="$env:SONAR_TOKEN"

# ---------------- SECURITY SCAN ----------------
security_scan:
  stage: security
  tags:
    - windows
  script:
    - powershell |
        $ErrorActionPreference = "Stop"

        $projectPath = "D:\dotnetdeploy"
        cd $projectPath

        Write-Output "Running dependency vulnerability scan..."

        if (-not (dotnet tool list -g | Select-String "dotnet-outdated-tool")) {
            dotnet tool install --global dotnet-outdated-tool
        }

        $env:PATH += ";$env:USERPROFILE\.dotnet\tools"

        dotnet outdated --severity Critical

        if ($LASTEXITCODE -ne 0) {
            Write-Error "Critical vulnerabilities detected!"
            exit 1
        }

# ---------------- DEPLOY ----------------
deploy_job:
  stage: deploy
  tags:
    - windows
  script:
    - powershell |
        $ErrorActionPreference = "Stop"

        $publishPath = "D:\dotnetdeploy\publish"
        $deployPath  = "D:\inetpub\wwwroot\RSignAPI"
        $backupRoot  = "D:\backup"

        $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
        $backupPath = "$backupRoot\RSignAPI_$timestamp"

    

        Write-Output "Taking backup..."
        Copy-Item $deployPath $backupPath -Recurse -Force

        Write-Output "Deploying new build..."
        Copy-Item "$publishPath\*" -Destination $deployPath -Recurse -Force

      

        Write-Output "Deployment completed successfully!"
